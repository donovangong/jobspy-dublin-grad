<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>JobSpy Cork Graduate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      line-height: 1.4;
    }
    h1 {
      margin-bottom: 6px;
    }
    .meta {
      color: #666;
      margin-bottom: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      vertical-align: top;
      text-align: left;
    }
    th {
      background: #f5f5f5;
      position: sticky;
      top: 0;
    }
    a {
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Cork Graduate Jobs</h1>
  <div class="meta">Last updated: 2026-03-25 01:05:25 UTC</div>
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Company</th>
        <th>Site</th>
        <th>Location</th>
        <th>Posted</th>
        <th>Search Term</th>
        <th>Link</th>
      </tr>
    </thead>
    <tbody>
      
        <tr>
          <td colspan="7">No jobs found in the last 24 hours.</td>
        </tr>
        
    </tbody>
  </table>
</body>
</html>
